services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
      target: builder
    command: npm run dev -w @fiddle/server
    working_dir: /app
    volumes:
      - ./packages/server/src:/app/packages/server/src
      - ./packages/shared/src:/app/packages/shared/src
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      HOST: "0.0.0.0"
